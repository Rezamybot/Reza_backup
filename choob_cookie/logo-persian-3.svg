<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Persian Inspired v3 - Modern Farsi Fusion -->
  <rect width="400" height="300" fill="#0D0D0D"/>
  
  <!-- Farsi word shape abstract - "Choob" calligraphic feel -->
  <path d="M140 120 Q130 100 150 90 Q170 80 180 100 Q190 80 210 90 Q230 100 220 120" fill="none" stroke="#D4A056" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Cookie - golden circle with pattern -->
  <circle cx="200" cy="150" r="45" fill="none" stroke="#D4A056" stroke-width="4"/>
  <circle cx="200" cy="150" r="38" fill="none" stroke="#8B6914" stroke-width="1"/>
  
  <!-- Seeds in circular pattern -->
  <g fill="#D4A056">
    <circle cx="175" cy="140" r="3"/>
    <circle cx="190" cy="128" r="3"/>
    <circle cx="210" cy="128" r="3"/>
    <circle cx="225" cy="140" r="3"/>
    <circle cx="228" cy="158" r="3"/>
    <circle cx="210" cy="172" r="3"/>
    <circle cx="190" cy="172" r="3"/>
    <circle cx="172" cy="158" r="3"/>
  </g>
  <g fill="#1A1A1A">
    <circle cx="182" cy="148" r="2"/>
    <circle cx="200" cy="135" r="2"/>
    <circle cx="218" cy="148" r="2"/>
    <circle cx="215" cy="165" r="2"/>
    <circle cx="200" cy="165" r="2"/>
    <circle cx="185" cy="165" r="2"/>
  </g>
  
  <!-- Decorative Persian dots -->
  <circle cx="200" cy="200" r="4" fill="#D4A056"/>
  <circle cx="180" cy="205" r="2" fill="#D4A056" opacity="0.6"/>
  <circle cx="220" cy="205" r="2" fill="#D4A056" opacity="0.6"/>
  
  <!-- Text - bold -->
  <text x="200" y="245" font-family="Arial Black, sans-serif" font-size="42" fill="#D4A056" text-anchor="middle" letter-spacing="2">CHOOB</text>
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle" letter-spacing="8">COOKIE</text>
  
  <!-- Farsi subtitle -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="9" fill="#D4A056" text-anchor="middle">چوب = wood — made for dipping</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Persian + Smile with Seeds - Dark Mode -->
  <rect width="400" height="300" fill="#0D0D0D"/>
  
  <!-- CH text -->
  <text x="110" y="160" font-family="Arial Black, sans-serif" font-size="70" fill="#D4A056" text-anchor="middle">CH</text>
  
  <!-- Left cookie O - golden with seeds -->
  <circle cx="185" cy="145" r="38" fill="#D4A056"/>
  <circle cx="185" cy="145" r="30" fill="none" stroke="#0D0D0D" stroke-width="2"/>
  <!-- Seeds on left cookie -->
  <circle cx="170" cy="135" r="2" fill="#0D0D0D"/>
  <circle cx="195" cy="130" r="2" fill="#0D0D0D"/>
  <circle cx="200" cy="145" r="2" fill="#0D0D0D"/>
  <circle cx="175" cy="150" r="2" fill="#0D0D0D"/>
  <circle cx="185" cy="158" r="2" fill="#0D0D0D"/>
  <circle cx="195" cy="155" r="2" fill="#0D0D0D"/>
  <!-- Smile -->
  <path d="M168 145 Q185 168 202 145" fill="none" stroke="#0D0D0D" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Right cookie O - golden with seeds -->
  <circle cx="265" cy="145" r="38" fill="#D4A056"/>
  <circle cx="265" cy="145" r="30" fill="none" stroke="#0D0D0D" stroke-width="2"/>
  <!-- Seeds on right cookie -->
  <circle cx="250" cy="135" r="2" fill="#0D0D0D"/>
  <circle cx="275" cy="130" r="2" fill="#0D0D0D"/>
  <circle cx="280" cy="145" r="2" fill="#0D0D0D"/>
  <circle cx="255" cy="150" r="2" fill="#0D0D0D"/>
  <circle cx="265" cy="158" r="2" fill="#0D0D0D"/>
  <circle cx="275" cy="155" r="2" fill="#0D0D0D"/>
  <!-- Smile -->
  <path d="M248 145 Q265 168 282 145" fill="none" stroke="#0D0D0D" stroke-width="3" stroke-linecap="round"/>
  
  <!-- BB text -->
  <text x="340" y="160" font-family="Arial Black, sans-serif" font-size="70" fill="#D4A056" text-anchor="middle">B</text>
  
  <!-- COOKIE subtitle -->
  <text x="200" y="235" font-family="Arial, sans-serif" font-size="18" fill="#D4A056" text-anchor="middle" letter-spacing="12">COOKIE</text>
  
  <!-- Minimal underline -->
  <line x1="150" y1="255" x2="250" y2="255" stroke="#D4A056" stroke-width="2"/>
  
  <!-- Tagline with Farsi -->
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">چوب = wood · made for dipping</text>
</svg>
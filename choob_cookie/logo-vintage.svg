<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Vintage Style Logo -->
  <defs>
    <pattern id="persian" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="#8B4513" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#FDF6E3"/>
  
  <!-- Persian pattern border -->
  <rect x="20" y="20" width="360" height="260" fill="none" stroke="#8B4513" stroke-width="4"/>
  <rect x="30" y="30" width="340" height="240" fill="none" stroke="#D4A574" stroke-width="2"/>
  
  <!-- Tea cup -->
  <ellipse cx="200" cy="180" rx="50" ry="15" fill="#8B4513"/>
  <path d="M150 180 Q150 240 200 240 Q250 240 250 180" fill="#DEB887"/>
  <path d="M150 180 Q150 120 200 120 Q250 120 250 180" fill="#F5DEB3"/>
  <ellipse cx="200" cy="180" rx="50" ry="15" fill="#8B4513"/>
  
  <!-- Cookie on saucer -->
  <ellipse cx="200" cy="260" rx="60" ry="10" fill="#D2691E"/>
  <ellipse cx="200" cy="258" rx="55" ry="8" fill="#DEB887"/>
  
  <!-- Steam -->
  <path d="M180 110 Q175 90 185 80" stroke="#A0522D" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M200 105 Q195 80 205 70" stroke="#A0522D" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M220 110 Q215 90 225 80" stroke="#A0522D" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Text -->
  <text x="200" y="50" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#8B4513" text-anchor="middle">Choob Cookie</text>
  <text x="200" y="285" font-family="Georgia, serif" font-size="14" fill="#8B4513" text-anchor="middle">Dip into tradition</text>
</svg>
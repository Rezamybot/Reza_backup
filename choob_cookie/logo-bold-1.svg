<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Bold & Edgy Logo v1 -->
  <rect width="400" height="300" fill="#1A1A1A"/>
  
  <!-- Bold cookie circle - negative space -->
  <circle cx="200" cy="130" r="70" fill="none" stroke="#E8DCC4" stroke-width="8"/>
  
  <!-- Seeds as negative space dots -->
  <circle cx="170" cy="115" r="4" fill="#E8DCC4"/>
  <circle cx="190" cy="105" r="4" fill="#E8DCC4"/>
  <circle cx="210" cy="110" r="4" fill="#E8DCC4"/>
  <circle cx="230" cy="120" r="4" fill="#E8DCC4"/>
  <circle cx="175" cy="130" r="3" fill="#E8DCC4"/>
  <circle cx="195" cy="125" r="3" fill="#E8DCC4"/>
  <circle cx="215" cy="128" r="3" fill="#E8DCC4"/>
  <circle cx="230" cy="135" r="3" fill="#E8DCC4"/>
  <circle cx="185" cy="140" r="2.5" fill="#E8DCC4"/>
  <circle cx="205" cy="138" r="2.5" fill="#E8DCC4"/>
  <circle cx="220" cy="145" r="2.5" fill="#E8DCC4"/>
  
  <!-- Text - bold modern -->
  <text x="200" y="240" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="#E8DCC4" text-anchor="middle" letter-spacing="2">CHOOB</text>
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="16" fill="#E8DCC4" text-anchor="middle" letter-spacing="8">COOKIE</text>
  
  <!-- Accent line -->
  <line x1="140" y1="250" x2="260" y2="250" stroke="#C9A55C" stroke-width="3"/>
</svg>
<svg xmlns="http://www/.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Persian + Smile Combo - Clean & Edgy -->
  <rect width="400" height="300" fill="#0D0D0D"/>
  
  <!-- CH text -->
  <text x="110" y="160" font-family="Arial Black, sans-serif" font-size="70" fill="#D4A056" text-anchor="middle">CH</text>
  
  <!-- Left cookie O with smile -->
  <circle cx="185" cy="145" r="35" fill="none" stroke="#D4A056" stroke-width="5"/>
  <path d="M168 145 Q185 165 202 145" fill="none" stroke="#D4A056" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Right cookie O with smile -->
  <circle cx="265" cy="145" r="35" fill="none" stroke="#D4A056" stroke-width="5"/>
  <path d="M248 145 Q265 165 282 145" fill="none" stroke="#D4A056" stroke-width="4" stroke-linecap="round"/>
  
  <!-- B text -->
  <text x="340" y="160" font-family="Arial Black, sans-serif" font-size="70" fill="#D4A056" text-anchor="middle">B</text>
  
  <!-- COOKIE subtitle -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="18" fill="#D4A056" text-anchor="middle" letter-spacing="12">COOKIE</text>
  
  <!-- Minimal underline -->
  <line x1="150" y1="250" x2="250" y2="250" stroke="#D4A056" stroke-width="2"/>
  
  <!-- Tagline with Farsi -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">چوب = wood · made for dipping</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Smile Logo v3 - Cookie O's with seeds -->
  <rect width="400" height="300" fill="#1A1A1A"/>
  
  <!-- CH -->
  <text x="130" y="160" font-family="Impact, Arial Black, sans-serif" font-size="75" fill="#E8DCC4" text-anchor="middle">CH</text>
  
  <!-- Cookie O with smile + seeds -->
  <!-- Left cookie O -->
  <ellipse cx="195" cy="145" rx="32" ry="26" fill="#D4A056"/>
  <path d="M178 142 Q195 162 212 142" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
  <circle cx="185" cy="140" r="2" fill="#1A1A1A"/>
  <circle cx="205" cy="138" r="2" fill="#1A1A1A"/>
  
  <!-- Right cookie O -->
  <ellipse cx="275" cy="145" rx="32" ry="26" fill="#D4A056"/>
  <path d="M258 142 Q275 162 292 142" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
  <circle cx="265" cy="140" r="2" fill="#1A1A1A"/>
  <circle cx="285" cy="138" r="2" fill="#1A1A1A"/>
  
  <!-- BB -->
  <text x="350" y="160" font-family="Impact, Arial Black, sans-serif" font-size="75" fill="#E8DCC4" text-anchor="middle">B</text>
  
  <!-- COOKIE subtitle -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="18" fill="#D4A056" text-anchor="middle" letter-spacing="10">COOKIE</text>
  
  <!-- Line -->
  <line x1="150" y1="250" x2="250" y2="250" stroke="#D4A056" stroke-width="2"/>
  
  <!-- Tagline -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">چوب = wood · made for dipping</text>
</svg>
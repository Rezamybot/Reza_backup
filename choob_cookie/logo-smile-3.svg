<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Smile Logo v3 - Outlined CHB around smile cookies -->
  <rect width="400" height="300" fill="#1A1A1A"/>
  
  <!-- C as outline -->
  <text x="130" y="160" font-family="Impact, Arial Black, sans-serif" font-size="75" fill="none" stroke="#D4A056" stroke-width="4" text-anchor="middle">C</text>
  
  <!-- First cookie O (smiley) -->
  <ellipse cx="170" cy="115" rx="30" ry="24" fill="#D4A056"/>
  <path d="M153 112 Q170 135 187 112" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
  <circle cx="160" cy="108" r="2" fill="#1A1A1A"/>
  <circle cx="180" cy="106" r="2" fill="#1A1A1A"/>
  
  <!-- H as outline -->
  <text x="215" y="160" font-family="Impact, Arial Black, sans-serif" font-size="75" fill="none" stroke="#D4A056" stroke-width="4" text-anchor="middle">H</text>
  
  <!-- Second cookie O (smiley) -->
  <ellipse cx="260" cy="115" rx="30" ry="24" fill="#D4A056"/>
  <path d="M243 112 Q260 135 277 112" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
  <circle cx="250" cy="108" r="2" fill="#1A1A1A"/>
  <circle cx="270" cy="106" r="2" fill="#1A1A1A"/>
  
  <!-- B as outline -->
  <text x="305" y="160" font-family="Impact, Arial Black, sans-serif" font-size="75" fill="none" stroke="#D4A056" stroke-width="4" text-anchor="middle">B</text>
  
  <!-- COOKIE subtitle -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="18" fill="#D4A056" text-anchor="middle" letter-spacing="10">COOKIE</text>
  
  <!-- Line -->
  <line x1="150" y1="250" x2="250" y2="250" stroke="#D4A056" stroke-width="2"/>
  
  <!-- Tagline -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">چوب = wood · made for dipping</text>
</svg>
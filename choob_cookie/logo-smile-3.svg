<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Smile Logo v3 - Properly Aligned -->
  <rect width="400" height="300" fill="#1A1A1A"/>
  
  <!-- Letters aligned with cookie centers -->
  <text x="70" y="160" font-family="Impact, Arial Black, sans-serif" font-size="75" fill="#E8DCC4" text-anchor="middle">C</text>
  <text x="125" y="160" font-family="Impact, Arial Black, sans-serif" font-size="75" fill="#E8DCC4" text-anchor="middle">H</text>
  
  <!-- Left cookie O (centered at x=180) -->
  <ellipse cx="180" cy="115" rx="30" ry="24" fill="#D4A056"/>
  <path d="M163 112 Q180 135 197 112" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
  <circle cx="170" cy="108" r="2" fill="#1A1A1A"/>
  <circle cx="190" cy="106" r="2" fill="#1A1A1A"/>
  
  <!-- Right cookie O (centered at x=235) -->
  <ellipse cx="235" cy="115" rx="30" ry="24" fill="#D4A056"/>
  <path d="M218 112 Q235 135 252 112" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
  <circle cx="225" cy="108" r="2" fill="#1A1A1A"/>
  <circle cx="245" cy="106" r="2" fill="#1A1A1A"/>
  
  <!-- B -->
  <text x="290" y="160" font-family="Impact, Arial Black, sans-serif" font-size="75" fill="#E8DCC4" text-anchor="middle">B</text>
  
  <!-- COOKIE subtitle -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="18" fill="#D4A056" text-anchor="middle" letter-spacing="10">COOKIE</text>
  
  <!-- Line -->
  <line x1="150" y1="250" x2="250" y2="250" stroke="#D4A056" stroke-width="2"/>
  
  <!-- Tagline -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">چوب = wood · made for dipping</text>
</svg>
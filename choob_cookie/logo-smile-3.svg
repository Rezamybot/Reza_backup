<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Smile Logo v3 - C H O O B with smile cookies -->
  <rect width="400" height="300" fill="#1A1A1A"/>
  
  <!-- C -->
  <text x="80" y="160" font-family="Impact, Arial Black, sans-serif" font-size="75" fill="#E8DCC4" text-anchor="middle">C</text>
  
  <!-- H -->
  <text x="145" y="160" font-family="Impact, Arial Black, sans-serif" font-size="75" fill="#E8DCC4" text-anchor="middle">H</text>
  
  <!-- First cookie O (smiley) -->
  <ellipse cx="195" cy="115" rx="30" ry="24" fill="#D4A056"/>
  <path d="M178 112 Q195 135 212 112" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
  <circle cx="185" cy="108" r="2" fill="#1A1A1A"/>
  <circle cx="205" cy="106" r="2" fill="#1A1A1A"/>
  
  <!-- Second cookie O (smiley) -->
  <ellipse cx="255" cy="115" rx="30" ry="24" fill="#D4A056"/>
  <path d="M238 112 Q255 135 272 112" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
  <circle cx="245" cy="108" r="2" fill="#1A1A1A"/>
  <circle cx="265" cy="106" r="2" fill="#1A1A1A"/>
  
  <!-- B -->
  <text x="315" y="160" font-family="Impact, Arial Black, sans-serif" font-size="75" fill="#E8DCC4" text-anchor="middle">B</text>
  
  <!-- COOKIE subtitle -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="18" fill="#D4A056" text-anchor="middle" letter-spacing="10">COOKIE</text>
  
  <!-- Line -->
  <line x1="150" y1="250" x2="250" y2="250" stroke="#D4A056" stroke-width="2"/>
  
  <!-- Tagline -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">چوب = wood · made for dipping</text>
</svg>
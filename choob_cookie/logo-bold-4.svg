<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Modern Minimal v4 -->
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A056"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="#0D0D0D"/>
  
  <!-- Simple cookie outline -->
  <ellipse cx="200" cy="110" rx="60" ry="18" fill="none" stroke="url(#gold)" stroke-width="5"/>
  
  <!-- Seeds - asymmetrical placement -->
  <ellipse cx="165" cy="105" rx="4" ry="2" fill="#D4A056" transform="rotate(-20 165 105)"/>
  <ellipse cx="185" cy="98" rx="4" ry="2" fill="#D4A056" transform="rotate(15 185 98)"/>
  <ellipse cx="205" cy="96" rx="4" ry="2" fill="#D4A056" transform="rotate(-10 205 96)"/>
  <ellipse cx="225" cy="100" rx="4" ry="2" fill="#D4A056" transform="rotate(25 225 100)"/>
  <ellipse cx="240" cy="110" rx="4" ry="2" fill="#D4A056" transform="rotate(-15 240 110)"/>
  
  <!-- Black seeds -->
  <ellipse cx="175" cy="112" rx="2.5" ry="1.2" fill="#FFFFFF" transform="rotate(10 175 112)"/>
  <ellipse cx="195" cy="105" rx="2.5" ry="1.2" fill="#FFFFFF" transform="rotate(-20 195 105)"/>
  <ellipse cx="215" cy="108" rx="2.5" ry="1.2" fill="#FFFFFF" transform="rotate(5 215 108)"/>
  <ellipse cx="232" cy="115" rx="2.5" ry="1.2" fill="#FFFFFF" transform="rotate(-10 232 115)"/>
  
  <!-- Text - bold contrast -->
  <text x="200" y="180" font-family="Impact, Arial Black, sans-serif" font-size="52" fill="#D4A056" text-anchor="middle" letter-spacing="3">CHOOB</text>
  <text x="200" y="205" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" letter-spacing="12">COOKIE</text>
  
  <!-- Minimal line -->
  <line x1="150" y1="225" x2="250" y2="225" stroke="#D4A056" stroke-width="1" opacity="0.5"/>
  
  <!-- Small C for choob meaning -->
  <text x="200" y="265" font-family="Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">「choob」means wood in Farsi — made for dipping</text>
</svg>
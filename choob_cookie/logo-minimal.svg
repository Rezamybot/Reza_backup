<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Warm & Minimal Logo -->
  <rect width="400" height="200" fill="#FFF8F0"/>
  
  <!-- Simple cookie outline -->
  <g transform="translate(200, 100)">
    <!-- Cookie shape -->
    <ellipse cx="0" cy="0" rx="40" ry="12" fill="#D2691E"/>
    <ellipse cx="0" cy="-2" rx="36" ry="9" fill="#DEB887"/>
    
    <!-- Steam swirl -->
    <path d="M-15 -35 Q-25 -50 -10 -60 Q5 -70 15 -55" stroke="#C4A484" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M5 -40 Q15 -55 25 -45" stroke="#C4A484" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Text - clean script -->
  <text x="200" y="45" font-family="Helvetica Neue, sans-serif" font-size="36" font-weight="300" fill="#5D4037" text-anchor="middle">Choob Cookie</text>
  <text x="200" y="165" font-family="Helvetica Neue, sans-serif" font-size="12" fill="#8D6E63" text-anchor="middle" letter-spacing="2">DIP INTO TRADITION</text>
  
  <!-- Small heart accent -->
  <path d="M330 170 C335 165 345 165 350 170 C355 165 365 165 370 170 C375 178 365 185 355 190 L330 190 C320 185 310 178 315 170 Z" fill="#D2691E" opacity="0.7"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Persian Inspired v2 - Tile Pattern -->
  <rect width="400" height="300" fill="#FAF7F2"/>
  
  <!-- Persian geometric tile background -->
  <g fill="none" stroke="#8B6914" stroke-width="1">
    <polygon points="200,20 240,50 240,90 200,120 160,90 160,50"/>
    <polygon points="120,80 150,100 150,140 120,160 90,140 90,100"/>
    <polygon points="280,80 310,100 310,140 280,160 250,140 250,100"/>
  </g>
  
  <!-- Main cookie - warm gold -->
  <ellipse cx="200" cy="150" rx="55" ry="16" fill="#D4A056"/>
  <ellipse cx="200" cy="147" rx="48" ry="13" fill="#E0B468"/>
  
  <!-- Seeds - scattered naturally -->
  <circle cx="165" cy="145" r="3" fill="#2C2C2C"/>
  <circle cx="185" cy="140" r="3" fill="#2C2C2C"/>
  <circle cx="205" cy="138" r="3" fill="#2C2C2C"/>
  <circle cx="225" cy="142" r="3" fill="#2C2C2C"/>
  <circle cx="240" cy="150" r="3" fill="#2C2C2C"/>
  <circle cx="175" cy="152" r="2.5" fill="#FAF7F2"/>
  <circle cx="195" cy="148" r="2.5" fill="#FAF7F2"/>
  <circle cx="215" cy="150" r="2.5" fill="#FAF7F2"/>
  <circle cx="232" cy="155" r="2.5" fill="#FAF7F2"/>
  
  <!-- Persian decorative border -->
  <rect x="80" y="200" width="240" height="2" fill="#8B6914"/>
  <rect x="80" y="210" width="240" height="1" fill="#D4A056"/>
  
  <!-- Text - elegant serif -->
  <text x="200" y="240" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#2C2C2C" text-anchor="middle">Choob Cookie</text>
  <text x="200" y="265" font-family="Georgia, serif" font-size="11" fill="#8B6914" text-anchor="middle" letter-spacing="4">خوشمزه — Delicious</text>
</svg>
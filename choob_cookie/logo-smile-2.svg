<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Smile Logo v2 - Clean & Edgy -->
  <rect width="400" height="300" fill="#0D0D0D"/>
  
  <!-- CH part -->
  <text x="140" y="160" font-family="Arial Black, sans-serif" font-size="80" fill="#D4A056" text-anchor="middle">CH</text>
  
  <!-- Smile as cookie O's -->
  <!-- Left cookie/smile -->
  <ellipse cx="200" cy="145" rx="30" ry="24" fill="none" stroke="#D4A056" stroke-width="5"/>
  <path d="M182 142 Q200 165 218 142" fill="none" stroke="#D4A056" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Right cookie/smile -->
  <ellipse cx="270" cy="145" rx="30" ry="24" fill="none" stroke="#D4A056" stroke-width="5"/>
  <path d="M252 142 Q270 165 288 142" fill="none" stroke="#D4A056" stroke-width="4" stroke-linecap="round"/>
  
  <!-- BB part -->
  <text x="340" y="160" font-family="Arial Black, sans-serif" font-size="80" fill="#D4A056" text-anchor="middle">B</text>
  
  <!-- COOKIE subtitle -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="20" fill="#D4A056" text-anchor="middle" letter-spacing="12">COOKIE</text>
  
  <!-- Minimal line -->
  <line x1="150" y1="250" x2="250" y2="250" stroke="#D4A056" stroke-width="2"/>
  
  <!-- Tagline -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">چوب = wood · made for dipping</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Realistic Cookie Logo v2 with spoon -->
  <rect width="400" height="300" fill="#FFFDF5"/>
  
  <!-- Spoon -->
  <path d="M280 130 L340 130 Q350 130 350 145 L350 170 Q350 185 340 185 L280 185 Q270 185 270 170 L270 145 Q270 130 280 130" fill="#E8E8E8" stroke="#B0B0B0" stroke-width="1"/>
  <ellipse cx="275" cy="157" rx="15" ry="25" fill="#D0D0D0" stroke="#A0A0A0" stroke-width="1"/>
  
  <!-- Cookie - golden brown round -->
  <ellipse cx="180" cy="160" rx="75" ry="20" fill="#C48E55"/>
  <ellipse cx="180" cy="155" rx="70" ry="17" fill="#D4A056"/>
  <ellipse cx="180" cy="150" rx="65" ry="14" fill="#E0B468"/>
  
  <!-- Sesame seeds -->
  <!-- White sesame -->
  <ellipse cx="155" cy="148" rx="3.5" ry="1.8" fill="#F5F5DC" transform="rotate(-15 155 148)"/>
  <ellipse cx="170" cy="144" rx="3.5" ry="1.8" fill="#F5F5DC" transform="rotate(10 170 144)"/>
  <ellipse cx="185" cy="142" rx="3.5" ry="1.8" fill="#F5F5DC" transform="rotate(-5 185 142)"/>
  <ellipse cx="200" cy="145" rx="3.5" ry="1.8" fill="#F5F5DC" transform="rotate(20 200 145)"/>
  <ellipse cx="160" cy="155" rx="3" ry="1.5" fill="#F5F5DC" transform="rotate(5 160 155)"/>
  <ellipse cx="180" cy="150" rx="3" ry="1.5" fill="#F5F5DC" transform="rotate(-20 180 150)"/>
  <ellipse cx="195" cy="152" rx="3" ry="1.5" fill="#F5F5DC" transform="rotate(15 195 152)"/>
  <ellipse cx="175" cy="145" rx="2.8" ry="1.4" fill="#F5F5DC" transform="rotate(-8 175 145)"/>
  <ellipse cx="190" cy="148" rx="2.8" ry="1.4" fill="#F5F5DC" transform="rotate(12 190 148)"/>
  
  <!-- Black sesame -->
  <ellipse cx="162" cy="152" rx="2.5" ry="1.2" fill="#2C2C2C" transform="rotate(10 162 152)"/>
  <ellipse cx="178" cy="146" rx="2.5" ry="1.2" fill="#2C2C2C" transform="rotate(-15 178 146)"/>
  <ellipse cx="195" cy="147" rx="2.5" ry="1.2" fill="#2C2C2C" transform="rotate(5 195 147)"/>
  <ellipse cx="208" cy="153" rx="2.5" ry="1.2" fill="#2C2C2C" transform="rotate(-10 208 153)"/>
  <ellipse cx="172" cy="150" rx="2" ry="1" fill="#2C2C2C" transform="rotate(20 172 150)"/>
  <ellipse cx="202" cy="150" rx="2" ry="1" fill="#2C2C2C" transform="rotate(-5 202 150)"/>
  
  <!-- Text -->
  <text x="200" y="240" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#5D4037" text-anchor="middle">Choob Cookie</text>
  <text x="200" y="265" font-family="Georgia, serif" font-size="14" fill="#8D6E63" text-anchor="middle">Dip into tradition</text>
  
  <!-- Simple underline -->
  <line x1="120" y1="280" x2="280" y2="280" stroke="#D4A056" stroke-width="2"/>
</svg>
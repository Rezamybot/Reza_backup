<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Minimal Edge Logo v3 -->
  <rect width="400" height="300" fill="#FFFFFF"/>
  
  <!-- Abstract cookie + dip symbol -->
  <ellipse cx="200" cy="120" rx="55" ry="15" fill="#C4884A"/>
  <ellipse cx="200" cy="115" rx="50" ry="12" fill="#DAA55A"/>
  
  <!-- Dip line - representing tea/coffee cup rim -->
  <path d="M130 130 Q200 180 270 130" stroke="#2C2C2C" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Cookie seeds - minimal dots -->
  <circle cx="175" cy="115" r="3" fill="#2C2C2C"/>
  <circle cx="195" cy="110" r="3" fill="#2C2C2C"/>
  <circle cx="215" cy="112" r="3" fill="#2C2C2C"/>
  <circle cx="230" cy="118" r="3" fill="#2C2C2C"/>
  <circle cx="185" cy="120" r="2.5" fill="#2C2C2C"/>
  <circle cx="208" cy="118" r="2.5" fill="#2C2C2C"/>
  <circle cx="170" cy="122" r="2" fill="#2C2C2C"/>
  <circle cx="220" cy="122" r="2" fill="#2C2C2C"/>
  
  <!-- Text - ultra clean -->
  <text x="200" y="200" font-family="Helvetica Neue, Arial, sans-serif" font-size="48" font-weight="300" fill="#2C2C2C" text-anchor="middle">Choob</text>
  <text x="200" y="225" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="600" fill="#C4884A" text-anchor="middle" letter-spacing="8">COOKIE</text>
  
  <!-- Small tagline -->
  <text x="200" y="260" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle" letter-spacing="2">DIP INTO TRADITION</text>
</svg>
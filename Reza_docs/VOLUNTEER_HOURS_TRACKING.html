<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Hours Tracking Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            font-size: 9pt;
            line-height: 1.2;
            color: #333;
            width: 7.5in;
            margin: 0;
            padding: 0.2in;
        }
        h1 { text-align: center; font-size: 14pt; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        h2 { font-size: 10pt; margin: 8px 0 4px 0; background: #f0f0f0; padding: 2px 6px; border-left: 2px solid #333; }
        .form-group { margin-bottom: 3px; }
        .form-group label { display: inline-block; width: 160px; font-weight: bold; font-size: 9pt; }
        .form-group .field { display: inline-block; border-bottom: 1px solid #333; width: calc(100% - 165px); min-width: 150px; padding: 1px 3px; }
        table { width: 100%; border-collapse: collapse; margin-top: 4px; }
        th, td { border: 1px solid #333; padding: 6px; text-align: left; font-size: 9pt; }
        th { background: #f0f0f0; font-size: 9pt; }
        .signature-box { margin-top: 6px; border: 1px solid #333; padding: 6px; }
        .signature-line { margin-bottom: 4px; }
        .signature-line label { display: inline-block; width: 140px; font-size: 9pt; }
        .signature-line .field { display: inline-block; border-bottom: 1px solid #333; width: calc(100% - 145px); }
        .stamp-area { border: 2px dashed #ccc; width: 100px; height: 50px; text-align: center; line-height: 50px; color: #ccc; font-size: 8pt; margin-top: 4px; }
        .notes-area { border: 1px solid #333; min-height: 30px; padding: 4px; margin-top: 2px; }
        .two-col { display: flex; gap: 10px; }
        .two-col > div { flex: 1; }
        @page { margin: 0.2in; size: letter; }
        @media print { body { padding: 0; } }
    </style>
</head>
<body>
    <h1>Volunteer Hours Tracking Form</h1>

    <div class="two-col">
        <div>
            <h2>Organization Information</h2>
            <div class="form-group"><label>Organization Name:</label><span class="field"></span></div>
            <div class="form-group"><label>Supervisor Name:</label><span class="field"></span></div>
            <div class="form-group"><label>Supervisor Email:</label><span class="field"></span></div>
        </div>
        <div>
            <h2>Volunteer Information</h2>
            <div class="form-group"><label>Volunteer Name:</label><span class="field"></span></div>
            <div class="form-group"><label>Volunteer Email:</label><span class="field"></span></div>
            <div class="form-group"><label>Volunteer Phone:</label><span class="field"></span></div>
        </div>
    </div>

    <h2>Hours Log</h2>
    <table>
        <thead>
            <tr><th style="width:18%">Date</th><th style="width:12%">Hours</th><th style="width:55%">Activity/Task</th><th style="width:15%">Initials</th></tr>
        </thead>
        <tbody>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </tbody>
    </table>

    <div class="form-group"><label>Total Hours:</label><span class="field" style="width:100px"></span> <label>Date Range:</label><span class="field"></span></div>

    <div class="two-col">
        <div class="signature-box">
            <div class="signature-line"><label>Supervisor Name:</label><span class="field"></span></div>
            <div class="signature-line"><label>Signature:</label><span class="field"></span></div>
            <div class="signature-line"><label>Date:</label><span class="field"></span></div>
        </div>
        <div class="signature-box">
            <div class="signature-line"><label>Org Rep Name:</label><span class="field"></span></div>
            <div class="signature-line"><label>Signature:</label><span class="field"></span></div>
            <div class="signature-line"><label>Date:</label><span class="field"></span></div>
            <div class="signature-line"><label>Stamp:</label><div class="stamp-area">Stamp</div></div>
        </div>
    </div>

    <div class="signature-box" style="margin-top:6px;">
        <div class="form-group"><label>Notes:</label><div class="notes-area"></div></div>
    </div>

    <div class="signature-line" style="margin-top:6px;"><label>Volunteer Signature:</label><span class="field" style="width:200px"></span> <label>Date:</label><span class="field" style="width:80px"></span></div>

    <p style="text-align:center;font-size:8pt;color:#666;margin-top:8px;"><em>This form is for personal record-keeping and verification purposes.</em></p>
</body>
</html>

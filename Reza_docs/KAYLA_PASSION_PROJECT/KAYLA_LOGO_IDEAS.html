<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayla's Passion Project - Logo</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .logo-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 300px; margin: 0 auto; }
        svg { width: 150px; height: 150px; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">Pouch Logo</h1>
    
    <div class="logo-card">
        <svg viewBox="0 0 100 100">
            <!-- Dashed stitching border -->
            <rect x="8" y="25" width="84" height="50" rx="3" fill="none" stroke="#36454F" stroke-width="2" stroke-dasharray="5,3"/>
            <!-- White patch -->
            <rect x="15" y="32" width="70" height="36" rx="2" fill="white" stroke="none"/>
            <!-- Three dots -->
            <circle cx="35" cy="50" r="3.5" fill="#36454F"/>
            <circle cx="50" cy="50" r="3.5" fill="#36454F"/>
            <circle cx="65" cy="50" r="3.5" fill="#36454F"/>
        </svg>
    </div>
</body>
</html>
